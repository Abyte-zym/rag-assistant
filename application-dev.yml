# RAG知识库 — 本地开发环境
spring:
  datasource:
    url: jdbc:h2:mem:rag_dev;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data.redis:
    host: localhost
    port: 6379

ai:
  api-key: ${QWEN_API_KEY:sk-xxx}
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-turbo
  timeout: 60s

logging:
  level:
    com.zhangyanming.rag: DEBUG

server.port: 8080

# Docker Compose 部署环境配置
# 启动方式：docker-compose up -d

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/rag_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
  data.redis:
    host: redis
    port: 6379

ai:
  api-key: ${QWEN_API_KEY}
  model: qwen-turbo

logging:
  level:
    root: WARN
    com.zhangyanming.rag: INFO
